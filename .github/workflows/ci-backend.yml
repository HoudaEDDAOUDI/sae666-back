name: CI Backend

on:
    push:
        branches: [main, develop]
    pull_request:
        branches: [main, develop]

jobs:
    ci:
        name: Lint & Validate
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.4'
                  extensions: intl, pdo_mysql, zip
                  coverage: none

            - name: Install dependencies
              run: composer install --no-interaction --prefer-dist --optimize-autoloader

            - name: Check security vulnerabilities
              run: composer audit

            - name: Lint YAML (config, routes, services)
              run: php bin/console lint:yaml config --parse-tags

            - name: Lint Twig (si applicable)
              run: php bin/console lint:twig templates || true

            - name: Lint container (services DI)
              run: php bin/console lint:container

            - name: Validate Doctrine schema
              run: php bin/console doctrine:schema:validate --skip-sync
              env:
                  DATABASE_URL: mysql://root:root@127.0.0.1:3306/app
